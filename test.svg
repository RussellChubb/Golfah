<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200px" height="900px"
     font-family="ConsolasFallback,Consolas,monospace"
     font-size="14px">

<style>
@font-face {
  src: local('Consolas'), local('Consolas Bold');
  font-family: 'ConsolasFallback';
  font-display: swap;
}
.key { fill: #9d9eff; }
.value { fill: #ffffff; }
.cc { fill: #616e7f; }
.prompt { fill: #3fb950; }
text, tspan { white-space: pre; }
</style>

<!-- Background -->
<rect width="1200" height="900" rx="18" fill="#161b22"/>

<!-- TITLE BAR -->
<text x="40" y="40" class="cc">
<tspan>golfah@github: ~/repos/golfah</tspan>
</text>

<!-- HEADER -->
<text x="40" y="80" class="value">
<tspan x="40" y="80">┌──────────────────────────────────────────────────────────────────────────┐</tspan>
<tspan x="40" y="100">│                                   GOLFAH                                  │</tspan>
<tspan x="40" y="120">│                    Data-Driven Golf Performance Tool                      │</tspan>
<tspan x="40" y="140">└──────────────────────────────────────────────────────────────────────────┘</tspan>
</text>

<!-- INFO -->
<text x="40" y="180">
<tspan class="prompt">$</tspan><tspan class="value"> project --info</tspan>

<tspan x="40" y="210" class="cc">. </tspan><tspan class="key">Name</tspan><tspan class="cc">............. </tspan><tspan class="value">Golfah</tspan>
<tspan x="40" y="230" class="cc">. </tspan><tspan class="key">Purpose</tspan><tspan class="cc">.......... </tspan><tspan class="value">Golf performance analytics</tspan>
<tspan x="40" y="250" class="cc">. </tspan><tspan class="key">Stack</tspan><tspan class="cc">............ </tspan><tspan class="value">Python, Streamlit, Pandas, Plotly</tspan>
<tspan x="40" y="270" class="cc">. </tspan><tspan class="key">Interface</tspan><tspan class="cc">........ </tspan><tspan class="value">Web (Local)</tspan>
<tspan x="40" y="290" class="cc">. </tspan><tspan class="key">Status</tspan><tspan class="cc">........... </tspan><tspan class="value">Active Development</tspan>
<tspan x="40" y="310" class="cc">. </tspan><tspan class="key">Author</tspan><tspan class="cc">........... </tspan><tspan class="value">Russell Chubb</tspan>
</text>

<!-- FEATURES -->
<text x="40" y="350">
<tspan class="prompt">$</tspan><tspan class="value"> project --features</tspan>

<tspan x="40" y="380" class="cc">. </tspan><tspan class="value">Performance dashboards</tspan>
<tspan x="40" y="400" class="cc">. </tspan><tspan class="value">Round &amp; hole-level tracking</tspan>
<tspan x="40" y="420" class="cc">. </tspan><tspan class="value">Trend analysis over time</tspan>
<tspan x="40" y="440" class="cc">. </tspan><tspan class="value">Par-relative scoring metrics</tspan>
<tspan x="40" y="460" class="cc">. </tspan><tspan class="value">Interactive visualisations</tspan>
</text>

<!-- INSTALL -->
<text x="40" y="500">
<tspan class="prompt">$</tspan><tspan class="value"> project --install</tspan>

<tspan x="40" y="530" class="cc">&gt; </tspan><tspan class="value">Python 3.8+, pip</tspan>

<tspan x="40" y="560" class="value">$ git clone https://github.com/yourusername/golfah.git</tspan>
<tspan x="40" y="580" class="value">$ cd golfah</tspan>
<tspan x="40" y="600" class="value">$ pip install -r requirements.txt</tspan>
<tspan x="40" y="620" class="value">$ streamlit run app.py</tspan>

<tspan x="40" y="650" class="cc">&gt; </tspan><tspan class="value">http://localhost:8501</tspan>
</text>

<!-- STRUCTURE -->
<text x="40" y="690">
<tspan class="prompt">$</tspan><tspan class="value"> project --structure</tspan>

<tspan x="40" y="720" class="value">golfah/</tspan>
<tspan x="40" y="740" class="value">├── app.py</tspan>
<tspan x="40" y="760" class="value">├── utils/</tspan>
<tspan x="40" y="780" class="value">│   ├── data_loader.py</tspan>
<tspan x="40" y="800" class="value">│   ├── metrics.py</tspan>
<tspan x="40" y="820" class="value">│   └── visuals.py</tspan>
<tspan x="40" y="840" class="value">└── data/</tspan>
</text>

<!-- FOOTER -->
<text x="40" y="880" class="cc">
<tspan>$ exit  ⛳  Track patterns. Learn misses. Lower scores.</tspan>
</text>

</svg>
